name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Unit Tests
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Resolve dependencies
        run: xcodebuild -project OrgSync.xcodeproj -scheme OrgSync -resolvePackageDependencies

      # The newest Xcode on the runner image can ship without a pre-installed
      # iOS simulator runtime (or any pre-created devices), in which case a
      # name-based destination like "iPhone 17" matches nothing. Install the
      # runtime only if missing, then create a device the runtime itself
      # declares support for, and test against its UDID.
      - name: Prepare iOS simulator
        id: simulator
        run: |
          set -euo pipefail
          if [ "$(xcrun simctl list runtimes ios --json | jq '[.runtimes[] | select(.isAvailable)] | length')" -eq 0 ]; then
            sudo xcodebuild -downloadPlatform iOS
          fi
          RUNTIMES=$(xcrun simctl list runtimes ios --json)
          RUNTIME=$(echo "$RUNTIMES" | jq -r '[.runtimes[] | select(.isAvailable)] | sort_by(.version) | last.identifier')
          DEVICE_TYPE=$(echo "$RUNTIMES" | jq -r '[.runtimes[] | select(.isAvailable)] | sort_by(.version) | last.supportedDeviceTypes | map(select(.productFamily=="iPhone")) | first.identifier')
          UDID=$(xcrun simctl create "CI iPhone" "$DEVICE_TYPE" "$RUNTIME")
          echo "Created $DEVICE_TYPE on $RUNTIME: $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: |
          xcodebuild \
            -project OrgSync.xcodeproj \
            -scheme OrgSync \
            -destination 'platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}' \
            -skip-testing:OrgSyncTests/LiveGitHubIntegrationTests \
            -resultBundlePath TestResults \
            test

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: TestResults
          path: TestResults.xcresult

  publish:
    name: Archive and upload to TestFlight
    needs: test
    # Pull requests run only the test job. A deployment is permitted only once
    # CI has passed for a push to main (including a merged pull request).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-26
    timeout-minutes: 45
    env:
      ASC_BYPASS_KEYCHAIN: "1"
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_PRIVATE_KEY_B64: ${{ secrets.ASC_PRIVATE_KEY_B64 }}
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Check release secrets
        run: |
          set -euo pipefail
          required_secrets=(
            ASC_KEY_ID
            ASC_ISSUER_ID
            ASC_PRIVATE_KEY_B64
            BUILD_CERTIFICATE_BASE64
            P12_PASSWORD
            BUILD_PROVISION_PROFILE_BASE64
            KEYCHAIN_PASSWORD
          )
          missing_secrets=()
          for secret_name in "${required_secrets[@]}"; do
            if [[ -z "${!secret_name}" ]]; then
              missing_secrets+=("$secret_name")
            fi
          done
          if (( ${#missing_secrets[@]} > 0 )); then
            echo "::error::Missing required repository Action secrets: ${missing_secrets[*]}"
            exit 1
          fi

      - name: Install release tools
        run: brew install just

      - name: Setup App Store Connect CLI
        uses: rudrankriyam/setup-asc@5358c70a27a3f0d1517604b0f1fdc43e70c1cc4d # v1.0.1

      - name: Install signing certificate and provisioning profile
        run: |
          set -euo pipefail
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo "$BUILD_CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 -D > "$PROFILE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' "$PROFILE_PLIST")
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"

      - name: Validate App Store Connect credentials
        run: asc auth status --validate

      - name: Publish to TestFlight
        run: |
          # GitHub run numbers are unique but begin at 1. The offset avoids
          # collisions with builds created before this workflow existed.
          export CI_BUILD_NUMBER="$((1000000 + GITHUB_RUN_NUMBER))"
          just publish
